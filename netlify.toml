[build]
  publish = "build"
  command = "pip install -r requirements.txt && echo 'Dependencies installed. Note: Full Streamlit functionality requires Streamlit Cloud.'"

[build.environment]
  PYTHON_VERSION = "3.11"

# For static site deployment
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Redirect rules for SPA
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200